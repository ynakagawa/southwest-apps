<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Flight Search Widget — Embed Demo</title>
    <style>
      body {
        margin: 0;
        padding: 40px 20px;
        background: #f4f4f4;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      }
      .demo-header {
        max-width: 640px;
        margin: 0 auto 24px;
      }
      .demo-header h1 {
        font-size: 20px;
        margin: 0 0 4px;
      }
      .demo-header p {
        margin: 0;
        color: #555;
        font-size: 14px;
      }
      .demo-widget {
        max-width: 640px;
        margin: 0 auto;
      }
    </style>
  </head>
  <body>
    <div class="demo-header">
      <h1>Flight Search Widget — Embed Demo</h1>
      <p>
        This page loads <code>flight-search-widget.js</code> exactly the way an
        EDS block would, then mounts the <code>&lt;sw-flight-search&gt;</code>
        custom element below. Open the browser console to see the redirect
        URL logged on submit instead of navigating away.
      </p>
    </div>

    <div class="demo-widget">
      <sw-flight-search></sw-flight-search>
    </div>

    <!--
      In production this script tag is added dynamically by the EDS block
      (see eds-block/flight-search.js). Here it's loaded directly since this
      page lives next to the built bundle.
    -->
    <script src="../flight-search-widget.js"></script>
  </body>
</html>
