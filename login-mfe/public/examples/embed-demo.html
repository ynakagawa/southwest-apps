<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login Widget — Embed Demo</title>
    <style>
      body {
        margin: 0;
        padding: 40px 20px;
        background: #f4f4f4;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      }
      .demo-header {
        max-width: 640px;
        margin: 0 auto 24px;
      }
      .demo-header h1 {
        font-size: 20px;
        margin: 0 0 4px;
      }
      .demo-header p {
        margin: 0;
        color: #555;
        font-size: 14px;
      }
      .demo-nav {
        max-width: 640px;
        margin: 0 auto;
        display: flex;
        justify-content: flex-end;
      }
    </style>
  </head>
  <body>
    <div class="demo-header">
      <h1>Login Widget — Embed Demo</h1>
      <p>
        This page loads <code>login-widget.js</code> exactly the way an EDS
        block would, then mounts the <code>&lt;sw-login&gt;</code> custom
        element below. Click "Log in" to open the popover. Open the browser
        console to see the redirect URL logged on submit instead of
        navigating away.
      </p>
    </div>

    <div class="demo-nav">
      <sw-login></sw-login>
    </div>

    <!--
      In production this script tag is added dynamically by the EDS block
      (see eds-block/login/login.js). Here it's loaded directly since this
      page lives next to the built bundle.
    -->
    <script src="../login-widget.js"></script>
  </body>
</html>
